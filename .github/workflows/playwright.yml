name: 'Playwright Automation Tests with Jenkins'

# ============================================================================
# TRIGGER CONDITIONS
# ============================================================================
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - chromium
          - firefox
          - webkit
      tag:
        description: 'Test Tag'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - smoke
          - regression
      workers:
        description: 'Worker Count'
        required: false
        default: 4
        type: number

# ============================================================================
# GLOBAL ENV VARIABLES
# ============================================================================
env:
  NODE_VERSION: '20.19.0' # Updated Node version (required >=20.17)
  CACHE_VERSION: v1

# ============================================================================
# JOBS
# ============================================================================
jobs:
  # ==========================================================================
  # JOB 1 - LINT & FORMAT CHECK
  # ==========================================================================
  lint:
    name: 'Lint & Format Check'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 'Checkout Code'
        uses: actions/checkout@v4

      - name: 'Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 'Install Dependencies'
        run: npm install
        # run: npm ci   # Commented due to lock-file mismatch issues

      - name: 'Run ESLint'
        run: npm run lint

      - name: 'Check Code Formatting'
        run: npm run format:check

      - name: 'Lint and Format Passed'
        run: echo "Code quality checks passed!"

  # ==========================================================================
  # JOB 2 - RUN PLAYWRIGHT TESTS (QA ONLY)
  # ==========================================================================
  tests:
    name: 'Run Tests - QA'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint

    # ------------------------------------------------------------------------
    # MATRIX STRATEGY (COMMENTED - Only QA needed right now)
    # ------------------------------------------------------------------------
    # strategy:
    #   fail-fast: false
    #   matrix:
    #     environment: [uat, qa]
    #     browser: [chromium]

    steps:
      - name: 'Checkout Code'
        uses: actions/checkout@v4

      - name: 'Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 'Install Dependencies'
        run: npm install
        # run: npm ci

      - name: 'Install Playwright Browsers'
        run: npx playwright install --with-deps

      # STEP 1: Read config file
      - name: Read CI Config
        id: config
        run: |
          if [ -f ci-config.json ]; then
            BROWSER=$(jq -r '.browser' ci-config.json)
            TAG=$(jq -r '.tag' ci-config.json)
            WORKERS=$(jq -r '.workers' ci-config.json)
          else
            BROWSER="all"
            TAG="all"
            WORKERS="4"
          fi

          echo "CONFIG_BROWSER=$BROWSER" >> $GITHUB_ENV
          echo "CONFIG_TAG=$TAG" >> $GITHUB_ENV
          echo "CONFIG_WORKERS=$WORKERS" >> $GITHUB_ENV

      # STEP 2: Override with manual input (if provided)
      - name: Resolve Final Parameters
        run: |
          FINAL_BROWSER="${{ github.event.inputs.browser }}"
          FINAL_TAG="${{ github.event.inputs.tag }}"
          FINAL_WORKERS="${{ github.event.inputs.workers }}"

          # fallback to config if empty
          if [ -z "$FINAL_BROWSER" ]; then FINAL_BROWSER="$CONFIG_BROWSER"; fi
          if [ -z "$FINAL_TAG" ]; then FINAL_TAG="$CONFIG_TAG"; fi
          if [ -z "$FINAL_WORKERS" ]; then FINAL_WORKERS="$CONFIG_WORKERS"; fi

          # final safety (VERY IMPORTANT)
          if [ -z "$FINAL_WORKERS" ] || [ "$FINAL_WORKERS" = "null" ]; then
            FINAL_WORKERS="4"
          fi

          echo "BROWSER=$FINAL_BROWSER" >> $GITHUB_ENV
          echo "TAG=$FINAL_TAG" >> $GITHUB_ENV
          echo "WORKERS=$FINAL_WORKERS" >> $GITHUB_ENV

          echo "FINAL CONFIG:"
          echo "Browser: $FINAL_BROWSER"
          echo "Tag: $FINAL_TAG"
          echo "Workers: $FINAL_WORKERS"

      # STEP 3: Run Playwright Tests (Dynamic)
      - name: 'Run Playwright Tests - QA'
        env:
          TEST_ENV: qa

          # URLs & Credentials
          BASE_URL_QA: ${{ secrets.BASE_URL_QA }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

        run: |
          echo "Resolving dynamic execution..."

          # -------------------------------
          # TAG logic
          # -------------------------------
          if [ "$TAG" != "all" ]; then
            GREP="--grep @$TAG"
          else
            GREP=""
          fi

          # ── WORKERS logic ──
          if [ "$WORKERS" = "all" ]; then
            WORKERS="4"
          fi

          # ✅ PROJECT LOGIC (FIXED)
          if [ "$BROWSER" = "all" ]; then

            echo "Running ALL projects"
            npx playwright test $GREP --workers=$WORKERS

          elif [ "$BROWSER" = "chromium" ]; then

            echo "Running chromium (login + auth)"
            npx playwright test $GREP --project=chromium --project=chromium-auth --workers=$WORKERS

          elif [ "$BROWSER" = "firefox" ]; then

            echo "Running firefox (login + auth)"
            npx playwright test $GREP --project=Firefox --project=firefox-auth --workers=$WORKERS

          elif [ "$BROWSER" = "webkit" ]; then

            echo "Running webkit (login + auth)"
            npx playwright test $GREP --project=webkit --project=webkit-auth --workers=$WORKERS

          fi

          
      - name: 'Print Flaky and Failed Test Summary'
        if: always()
        run: |
          echo "## 🧪 Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ ! -f "test-results/results.json" ]; then
            echo "⚠️ results.json not found" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          TOTAL=$(jq '[.suites[].specs[].tests[]] | length' test-results/results.json 2>/dev/null || echo "0")

          PASSED=$(jq '[.suites[].specs[].tests[] |
            select(.results[-1].status == "passed")] | length' \
            test-results/results.json 2>/dev/null || echo "0")

          FAILED=$(jq '[.suites[].specs[].tests[] |
            select(.results[-1].status == "failed" or .results[-1].status == "timedOut")] | length' \
            test-results/results.json 2>/dev/null || echo "0")

          FLAKY=$(jq '[.suites[].specs[].tests[] |
            select(.results[-1].status == "passed" and (.results | length) > 1)] | length' \
            test-results/results.json 2>/dev/null || echo "0")

          echo "| Total | Passed | Failed | Flaky |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| $TOTAL | $PASSED | $FAILED | $FLAKY |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # ── Flaky tests ──
          echo "### ⚠️ Flaky Tests (passed after retry)" >> $GITHUB_STEP_SUMMARY
          jq -r '
            .suites[].specs[].tests[] |
            select(.results[-1].status == "passed" and (.results | length) > 1) |
            "- **\(.title)** — passed on retry \((.results | length) - 1) — first error: \(.results[0].error.message // "unknown")"
          ' test-results/results.json 2>/dev/null >> $GITHUB_STEP_SUMMARY \
            || echo "No flaky tests" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY

          # ── Failed tests ──
          echo "### ❌ Failed Tests" >> $GITHUB_STEP_SUMMARY
          jq -r '
            .suites[].specs[].tests[] |
            select(.results[-1].status == "failed" or .results[-1].status == "timedOut") |
            "- **\(.title)** — \(.results[-1].status) after \((.results | length) - 1) retries\n  - Error: \(.results[-1].error.message // "No error message")"
          ' test-results/results.json 2>/dev/null >> $GITHUB_STEP_SUMMARY \
            || echo "No failed tests" >> $GITHUB_STEP_SUMMARY

          # ── Console me bhi print karo ──
          echo "========================================="
          echo "TEST SUMMARY"
          echo "Total  : $TOTAL"
          echo "Passed : $PASSED"
          echo "Failed : $FAILED"
          echo "Flaky  : $FLAKY"
          echo "========================================="

          if [ "$FLAKY" -gt "0" ]; then
            echo "⚠️ FLAKY TESTS:"
            jq -r '
              .suites[].specs[].tests[] |
              select(.results[-1].status == "passed" and (.results | length) > 1) |
              "  [FLAKY] \(.title) — retries: \((.results | length) - 1) — first error: \(.results[0].error.message // "unknown")"
            ' test-results/results.json 2>/dev/null
          fi

          if [ "$FAILED" -gt "0" ]; then
            echo "❌ FAILED TESTS:"
            jq -r '
              .suites[].specs[].tests[] |
              select(.results[-1].status == "failed" or .results[-1].status == "timedOut") |
              "  [FAILED] \(.title)\n  Status : \(.results[-1].status)\n  Retries: \((.results | length) - 1)\n  Error  : \(.results[-1].error.message // "No error")\n  Stack  : \(.results[-1].error.stack // "No stack")"
            ' test-results/results.json 2>/dev/null
          fi

      - name: 'Upload Error Logs'
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs-qa
          path: logs/errors.log
          retention-days: 30
          if-no-files-found: ignore

      - name: 'Upload Failure Screenshots'
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots-qa
          path: test-results/screenshots/
          retention-days: 30
          if-no-files-found: ignore

      # ================================
      # DEBUG STEP
      # ================================
      - name: 'Debug - Check Generated Folders'
        if: always()
        run: |
          echo "Current directory:"
          pwd

          echo "Listing all files and folders:"
          ls -R

      # ================================
      # ENSURE ARTIFACT FOLDERS
      # ================================
      - name: 'Ensure Artifact Folders Exist'
        if: always()
        run: |
          mkdir -p test-results
          mkdir -p playwright-report
          mkdir -p allure-results
          mkdir -p logs

      # ----------------------------------------------------------------------
      # GENERATE ALLURE REPORT
      # ----------------------------------------------------------------------
      - name: 'Generate Allure Report'
        if: always()
        run: npm run allure:generate

      # ----------------------------------------------------------------------
      # ARTIFACT UPLOADS
      # ----------------------------------------------------------------------

      - name: 'Upload Test Results'
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-qa
          path: test-results/
          retention-days: 30
          if-no-files-found: ignore

      - name: 'Upload Playwright Report'
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-qa
          path: playwright-report/
          retention-days: 30
          if-no-files-found: ignore

      - name: 'Upload Allure Results'
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-qa
          path: allure-results/
          retention-days: 30
          if-no-files-found: ignore

      - name: 'Upload Test Logs'
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-qa
          path: logs/
          retention-days: 30
          if-no-files-found: ignore

  # ==========================================================================
  # JOB 3 - PUBLISH TEST REPORT
  # ==========================================================================
  publish-report:
    name: 'Publish Test Report'
    runs-on: ubuntu-latest
    if: always()
    needs: tests

    steps:
      - name: 'Checkout Code'
        uses: actions/checkout@v4

      - name: 'Download All Artifacts'
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts/

      - name: 'Create Test Summary'
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const summary = `
            ## 🧪 Playwright Test Results Summary

            | Environment | Status |
            |-------------|--------|
            | QA | ✅ Completed |

            ### 📊 Artifacts Available
            - Test Results (screenshots/videos/traces)
            - Playwright HTML Report
            - Allure Results
            - Execution Logs

            Download them from the **Artifacts** section of the workflow.
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

  # ==========================================================================
  # JOB 4 - FINAL STATUS CHECK
  # ==========================================================================
  status-check:
    name: 'Status Check'
    runs-on: ubuntu-latest
    if: always()
    needs: [lint, tests]

    steps:
      - name: 'Check Workflow Status'
        run: |

          if [ "${{ needs.lint.result }}" == "failure" ]; then
            echo "❌ Lint check failed"
            exit 1
          fi

          if [ "${{ needs.tests.result }}" == "failure" ]; then
            echo "⚠️ Some tests failed - check artifacts"
          fi

          echo "✅ Workflow completed successfully"
