name: 'Playwright Automation Tests with Jenkins'

# ============================================================================
# TRIGGER CONDITIONS
# ============================================================================
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - chromium
          - firefox
          - webkit
      tag:
        description: 'Test Tag'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - smoke
          - regression
      worker:
        description: 'Worker Count'
        required: false
        default: 4
        type: number

# ============================================================================
# GLOBAL ENV VARIABLES
# ============================================================================
env:
  NODE_VERSION: '20.19.0' # Updated Node version (required >=20.17)
  CACHE_VERSION: v1

# ============================================================================
# JOBS
# ============================================================================
jobs:
  # ==========================================================================
  # JOB 1 - LINT & FORMAT CHECK
  # ==========================================================================
  lint:
    name: 'Lint & Format Check'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 'Checkout Code'
        uses: actions/checkout@v4

      - name: 'Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 'Install Dependencies'
        run: npm install
        # run: npm ci   # Commented due to lock-file mismatch issues

      - name: 'Run ESLint'
        run: npm run lint

      - name: 'Check Code Formatting'
        run: npm run format:check

      - name: '✅ Lint and Format Passed'
        run: echo "Code quality checks passed!"

  # ==========================================================================
  # JOB 2 - RUN PLAYWRIGHT TESTS (QA ONLY)
  # ==========================================================================
  tests:
    name: 'Run Tests - QA'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint

    # ------------------------------------------------------------------------
    # MATRIX STRATEGY (COMMENTED - Only QA needed right now)
    # ------------------------------------------------------------------------
    # strategy:
    #   fail-fast: false
    #   matrix:
    #     environment: [uat, qa]
    #     browser: [chromium]

    steps:
      - name: 'Checkout Code'
        uses: actions/checkout@v4

      - name: 'Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 'Install Dependencies'
        run: npm install
        # run: npm ci

      - name: 'Install Playwright Browsers'
        run: npx playwright install --with-deps

      - name: 📄 Read CI Config
        run: |
          CONFIG=$(cat ci-config.json)

          BROWSER=$(echo $CONFIG | jq -r '.browser')
          TAG=$(echo $CONFIG | jq -r '.tag')
          WORKERS=$(echo $CONFIG | jq -r '.workers')

          BROWSER=${BROWSER:-all}
          TAG=${TAG:-all}
          WORKERS=${WORKERS:-4}

          if [ "$WORKERS" = "null" ]; then WORKERS="4"; fi

          echo "BROWSER=$BROWSER" >> $GITHUB_ENV
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "WORKERS=$WORKERS" >> $GITHUB_ENV

      # ✅ STEP: Run Playwright Tests (Dynamic)
      - name: '🚀 Run Playwright Tests - QA (Dynamic)'
        env:
          TEST_ENV: qa

          # URLs & Credentials
          BASE_URL_QA: ${{ secrets.BASE_URL_QA }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

        run: |
          echo "🔧 Resolving dynamic execution..."

          # -------------------------------
          # TAG logic
          # -------------------------------
          if [ "$TAG" != "all" ]; then
            GREP="--grep @$TAG"
          else
            GREP=""
          fi

          # -------------------------------
          # BROWSER logic
          # -------------------------------
          if [ "$BROWSER" = "all" ]; then
            PROJECT=""
          else
            PROJECT="--project=$BROWSER"
          fi

          # -------------------------------
          # WORKERS logic
          # -------------------------------
          if [ "$WORKERS" = "all" ]; then
            WORKERS="4"
          fi

          # -------------------------------
          # FINAL COMMAND
          # -------------------------------
          echo "🚀 Running: npx playwright test $GREP $PROJECT --workers=$WORKERS"

          npx playwright test $GREP $PROJECT --workers=$WORKERS

      # ✅ STEP: Upload Report
      - name: 📊 Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      # ================================
      # DEBUG STEP
      # ================================
      - name: 'Debug - Check Generated Folders'
        if: always()
        run: |
          echo "Current directory:"
          pwd

          echo "Listing all files and folders:"
          ls -R

      # ================================
      # ENSURE ARTIFACT FOLDERS
      # ================================
      - name: 'Ensure Artifact Folders Exist'
        if: always()
        run: |
          mkdir -p test-results
          mkdir -p playwright-report
          mkdir -p allure-results
          mkdir -p logs

      # ----------------------------------------------------------------------
      # GENERATE ALLURE REPORT
      # ----------------------------------------------------------------------
      - name: 'Generate Allure Report'
        if: always()
        run: npm run allure:generate

      # ----------------------------------------------------------------------
      # ARTIFACT UPLOADS
      # ----------------------------------------------------------------------

      - name: 'Upload Test Results'
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-qa
          path: test-results/
          retention-days: 30
          if-no-files-found: ignore

      - name: 'Upload Playwright Report'
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-qa
          path: playwright-report/
          retention-days: 30
          if-no-files-found: ignore

      - name: 'Upload Allure Results'
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-qa
          path: allure-results/
          retention-days: 30
          if-no-files-found: ignore

      - name: 'Upload Test Logs'
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-qa
          path: logs/
          retention-days: 30
          if-no-files-found: ignore

  # ==========================================================================
  # JOB 3 - PUBLISH TEST REPORT
  # ==========================================================================
  publish-report:
    name: 'Publish Test Report'
    runs-on: ubuntu-latest
    if: always()
    needs: tests

    steps:
      - name: 'Checkout Code'
        uses: actions/checkout@v4

      - name: 'Download All Artifacts'
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts/

      - name: 'Create Test Summary'
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const summary = `
            ## 🧪 Playwright Test Results Summary

            | Environment | Status |
            |-------------|--------|
            | QA | ✅ Completed |

            ### 📊 Artifacts Available
            - Test Results (screenshots/videos/traces)
            - Playwright HTML Report
            - Allure Results
            - Execution Logs

            Download them from the **Artifacts** section of the workflow.
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

  # ==========================================================================
  # JOB 4 - FINAL STATUS CHECK
  # ==========================================================================
  status-check:
    name: 'Status Check'
    runs-on: ubuntu-latest
    if: always()
    needs: [lint, tests]

    steps:
      - name: 'Check Workflow Status'
        run: |

          if [ "${{ needs.lint.result }}" == "failure" ]; then
            echo "❌ Lint check failed"
            exit 1
          fi

          if [ "${{ needs.tests.result }}" == "failure" ]; then
            echo "⚠️ Some tests failed - check artifacts"
          fi

          echo "✅ Workflow completed successfully"
