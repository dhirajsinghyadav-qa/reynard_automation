name: Playwright Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      env:
        description: 'Environment'
        required: true
        default: 'qa'
        type: choice
        options: [qa, staging, prod]
      tag:
        description: 'Test tag'
        required: false
        default: 'smoke'
        type: choice
        options: [smoke, regression, all]
      browser:
        description: 'Browser'
        required: false
        default: 'chromium'
        type: choice
        options: [chromium, firefox, webkit, all]

jobs:
  test:
    name: Playwright Tests [${{ inputs.env || 'qa' }}]
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Tests
        env:
          ENV:      ${{ inputs.env || 'qa' }}
          BASE_URL: ${{ secrets.QA_BASE_URL }}
          USERNAME: ${{ secrets.QA_USERNAME }}
          PASSWORD: ${{ secrets.QA_PASSWORD }}
          CI:       true
        run: |
          TAG="${{ inputs.tag || 'smoke' }}"
          GREP=""
          if [ "$TAG" != "all" ]; then
            GREP="--grep @${TAG}"
          fi

          BROWSER="${{ inputs.browser || 'chromium' }}"
          PROJECT=""
          if [ "$BROWSER" != "all" ]; then
            PROJECT="--project=${BROWSER}"
          fi

          npx playwright test $GREP $PROJECT --workers=4

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 30

      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-${{ github.run_id }}
          path: allure-results/
          retention-days: 30

      - name: Upload Logs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-logs-${{ github.run_id }}
          path: |
            logs/
            test-results/
          retention-days: 7
